name: zerotierapi
description: A ZeroTier device status Flutter app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  provider: ^6.0.5
  shared_preferences: ^2.0.15
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  flutter_local_notifications: ^20.1.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.8.0
  sqflite: ^2.4.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  fl_chart: ^1.0.0  # 添加图表库

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: DroidSansFallback
      fonts:
        - asset: assets/fonts/DroidSansFallbackFull.ttf