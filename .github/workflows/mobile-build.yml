name: Build Mobile Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: build-android-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: build-ios-ipa-unsigned-no-widget
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS app (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive iOS app without signing
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned iOS IPA from archive (no widget)
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          rm -rf build/ios/ipa/Payload/Runner.app/PlugIns
          cd build/ios/ipa
          zip -r zerotierapi-ios-unsigned-no-widget.ipa Payload

      - name: Verify no app extensions in IPA
        run: |
          ! unzip -l build/ios/ipa/zerotierapi-ios-unsigned-no-widget.ipa | grep -E 'Payload/.+\.app/PlugIns/.+\.appex/'

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-ios-unsigned-no-widget-ipa
          path: build/ios/ipa/zerotierapi-ios-unsigned-no-widget.ipa
          if-no-files-found: error
