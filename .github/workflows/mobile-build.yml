name: Build Mobile Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: build-android-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: build-ios-ipa-unsigned
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS app (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        run: |
          mkdir -p dist
          mkdir -p dist/Payload
          cp -R build/ios/iphoneos/Runner.app dist/Payload/
          cd dist
          zip -r zerotierapi-ios-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-ios-unsigned-ipa
          path: dist/zerotierapi-ios-unsigned.ipa
          if-no-files-found: error
