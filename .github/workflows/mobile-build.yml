name: Build Mobile Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: build-android-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: build-ios-ipa-unsigned
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS IPA (release, no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Verify widget extension exists in IPA
        run: |
          unzip -l build/ios/ipa/*.ipa | grep -E 'Payload/.+\.app/PlugIns/.+\.appex/'

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotierapi-ios-unsigned-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
