name: Build Desktop Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            artifact_name: zerotierapi-linux
            artifact_path: dist/zerotierapi-linux-*.tar.gz
          - target: windows
            os: windows-latest
            artifact_name: zerotierapi-windows
            artifact_path: dist/zerotierapi-windows-*.zip
          - target: macos
            os: macos-latest
            artifact_name: zerotierapi-macos
            artifact_path: dist/zerotierapi-macos.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libsecret-1-dev

      - name: Build Linux package
        if: matrix.target == 'linux'
        run: bash ./scripts/package_desktop.sh

      - name: Build macOS package
        if: matrix.target == 'macos'
        run: bash ./scripts/package_desktop_macos.sh

      - name: Build Windows package
        if: matrix.target == 'windows'
        shell: cmd
        run: scripts\package_desktop.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
